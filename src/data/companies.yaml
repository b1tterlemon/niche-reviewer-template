# ─── COMPANIES DATA FILE ───────────────────────────────────────────────────
# Each entry drives: homepage card, comparison tables, and the per-company
# review page sidebar. Add a company here + create src/content/companies/<slug>.mdx
# for the full narrative review.
#
# FIELD GUIDE
# name              Display name of the company
# slug              URL slug: /companies/<slug>/ — lowercase, hyphens only
# logo              Filename under /public/logos/ e.g. "botpress.svg"
#                   Leave empty to use branded initials fallback on cards
# tagline           One-line value prop (your words, not theirs)
# rating            Numeric 0–5 (one decimal) — editorial, not aggregated
# review_count      Set 0 for editorial-only ratings
# summary           2-3 sentence editorial snapshot shown on cards
# best_for          Short phrase: who gets the most value (used in tables)
# services          Array from: custom-agents, multi-agent, RAG, voice-agents,
#                   MLOps, integration, consulting, staff-aug
# tech_specializations  LangGraph, CrewAI, AutoGen, OpenAI-API, Anthropic-API,
#                   vector-DBs, LangChain, Haystack, Azure-AI, AWS-Bedrock,
#                   GCP-Vertex, MCP, tool-use, n8n, Zapier
# industries_served fintech, healthcare, legal, e-commerce, logistics, SaaS,
#                   media, real-estate, insurance, manufacturing, HR
# engagement_models fixed-project, retainer, dedicated-team, T&M
# pricing_model     Free text; use "not public" if undisclosed
# company_size      e.g. "11–50", "51–200", "201–500", "1,000–5,000", "10,000+"
# location          HQ city, country
# regions_timezones Regions covered
# founded           Year (integer)
# notable_clients   Array of strings (verified clients or case study titles)
# certifications    AWS-Partner, Azure-Partner, GCP-Partner,
#                   OpenAI-Partner, Anthropic-Partner
# visit_url         Full outbound URL
# monetized         true | false
# rel               "sponsored" | "nofollow" | "" (empty = inherit from config)
# ─────────────────────────────────────────────────────────────────────────────

